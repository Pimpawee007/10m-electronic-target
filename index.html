<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10m Air Rifle Target</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { margin: 0; padding: 0; background-color: #f7f9fa; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .app-container { display: flex; width: 100vw; height: 100vh; background-color: #ffffff; }
        
        .left-panel { flex: 1.2; display: flex; justify-content: center; align-items: center; background-color: #ffffff; padding: 20px; position: relative; border-right: 2px solid #e1e8ed; }
        #targetCanvas { max-width: 90%; max-height: 90%; aspect-ratio: 1/1; background-color: #fff; cursor: crosshair; }
        
        .right-panel { flex: 0.8; display: flex; flex-direction: column; background-color: #ffffff; border-left: 1px solid #e1e8ed; }
        .score-section { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; border-bottom: 2px solid #e1e8ed; padding: 15px; position: relative; }
        .score-title { font-size: 28px; font-weight: 800; color: #1c2434; margin: 0; text-transform: uppercase; letter-spacing: 1px; }
        .score-display { font-size: 85px; font-weight: 800; color: #e74c3c; line-height: 1; margin-top: 5px; }
        
        .btn-reset { position: absolute; top: 15px; right: 20px; background-color: #ff0000; color: white; border: none; padding: 10px 22px; font-size: 16px; font-weight: bold; border-radius: 6px; cursor: pointer; text-transform: uppercase; }
        .btn-reset:hover { background-color: #cc0000; }
        
        .total-section { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; border-bottom: 2px solid #e1e8ed; padding: 15px; background-color: #fafbfc; position: relative; }
        .avg-display { position: absolute; top: 15px; left: 20px; font-size: 18px; font-weight: 800; color: #2ecc71; }
        .total-title { font-size: 28px; font-weight: 800; font-style: italic; color: #1c2434; margin: 0; }
        .total-display { font-size: 75px; font-weight: 800; color: #f39c12; line-height: 1; margin-top: 5px; }
        
        .history-section { flex: 1.8; padding: 20px; display: flex; flex-direction: column; background-color: #ffffff; }
        .history-title { font-size: 24px; font-weight: 700; color: #2c3e50; margin: 0 0 12px 0; text-align: center; text-decoration: underline; text-underline-offset: 4px; }
        .history-table-container { flex: 1; overflow-y: auto; }
        .history-table { width: 100%; border-collapse: collapse; font-size: 19px; text-align: center; }
        .history-table th { font-weight: 600; color: #7f8c8d; padding-bottom: 8px; font-size: 15px; }
        .history-table td { padding: 7px 5px; font-weight: 700; color: #2c3e50; width: 16.6%; }
        .arrow-indicator { color: #2ecc71; font-size: 18px; margin-left: 4px; display: inline-block; font-weight: 900; }
        .series-sum { color: #e74c3c; font-size: 21px; font-weight: 800; border-top: 2px solid #e1e8ed; padding-top: 5px; }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="left-panel">
            <canvas id="targetCanvas" width="600" height="600"></canvas>
        </div>

        <div class="right-panel">
            <div class="score-section">
                <h2 class="score-title">Score</h2>
                <div class="score-display" id="latestScore">0.0</div>
                <button class="btn-reset" onclick="resetSystem()">RESET</button>
            </div>
            
            <div class="total-section">
                <div class="avg-display" id="avgScore">AVG: 0.0</div>
                <h2 class="total-title">Total Score</h2>
                <div class="total-display" id="totalScore">0.0</div>
            </div>
            
            <div class="history-section">
                <h3 class="history-title">History</h3>
                <div class="history-table-container">
                    <table class="history-table">
                        <thead><tr id="tableHeader"></tr></thead>
                        <tbody id="tableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('targetCanvas');
        const ctx = canvas.getContext('2d');
        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;

        const ringRaddi = [270, 240, 211, 181, 151, 122, 92, 62, 33, 3]; 
        const ringLabels = ["1", "2", "3", "4", "5", "6", "7", "8"];

        let appState = {
            total_score: 0.0,
            latest_score: 0.0,
            shots: [],
            series_list: [[]]
        };

        function drawTarget() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = "#ffffff";
            ctx.beginPath();
            ctx.arc(centerX, centerY, ringRaddi[0], 0, 2 * Math.PI);
            ctx.fill();
            
            ctx.fillStyle = "#111111";
            ctx.beginPath();
            ctx.arc(centerX, centerY, ringRaddi[3], 0, 2 * Math.PI);
            ctx.fill();

            for(let i=0; i<ringRaddi.length; i++) {
                ctx.beginPath();
                ctx.arc(centerX, centerY, ringRaddi[i], 0, 2 * Math.PI);
                
                if (i >= 3) {
                    if (i === 9) {
                        ctx.strokeStyle = "#ffffff"; 
                        ctx.lineWidth = 1.5;
                    } else {
                        ctx.strokeStyle = "rgba(255, 255, 255, 0.3)";
                        ctx.lineWidth = 1;
                    }
                    ctx.fillStyle = "#ffffff";
                } else {
                    ctx.strokeStyle = "#404040";
                    ctx.fillStyle = "#7f8c8d";
                    ctx.lineWidth = 1;
                }
                ctx.stroke();
                
                if (i < ringLabels.length) {
                    ctx.font = "bold 11px sans-serif";
                    ctx.textAlign = "center";
                    ctx.textBaseline = "middle";
                    
                    ctx.fillText(ringLabels[i], centerX, centerY - ringRaddi[i] + 10);
                    ctx.fillText(ringLabels[i], centerX, centerY + ringRaddi[i] - 10);
                    ctx.fillText(ringLabels[i], centerX - ringRaddi[i] + 10, centerY);
                    ctx.fillText(ringLabels[i], centerX + ringRaddi[i] - 10, centerY);
                }
            }

            // 🆕 ปรับระบบการวาดรูกระสุน: แสดงผลเฉพาะ 5 นัดล่าสุดเท่านั้น
            const shots = appState.shots;
            if (shots && shots.length > 0) {
                // หาตำแหน่งเริ่มต้นที่จะวาด (เอาแค่ 5 นัดท้ายสุดของอาเรย์)
                const startIndex = Math.max(0, shots.length - 5);
                
                // วาดนัดก่อนหน้าในกลุ่ม 5 นัดล่าสุดให้เป็นสีเหลือง
                for(let i = startIndex; i < shots.length - 1; i++) {
                    ctx.fillStyle = "rgba(241, 196, 15, 0.8)";
                    ctx.strokeStyle = "#b7950b";
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.arc(centerX + shots[i].x, centerY + shots[i].y, 27, 0, 2 * Math.PI);
                    ctx.fill();
                    ctx.stroke();
                }
                
                // วาดนัดล่าสุด (นัดท้ายสุดจริง ๆ) ให้เป็นสีเขียวเสมอ
                const latest = shots[shots.length - 1];
                ctx.fillStyle = "rgba(46, 204, 113, 0.85)";
                ctx.strokeStyle = "#27ae60";
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(centerX + latest.x, centerY + latest.y, 27, 0, 2 * Math.PI);
                ctx.fill();
                ctx.stroke();
            }
        }

        function calculateScoreAndArrow(x, y) {
            const distance = Math.sqrt(x*x + y*y);
            let score = 10.9 - (distance / 29.6);
            
            if (distance <= 2.0) {
                score = 10.9;
            } else {
                score = Math.round(score * 10) / 10;
            }
            
            if (score < 0) score = 0.0;
            if (score > 10.9) score = 10.9;
            
            let arrow = "";
            if (distance > ringRaddi[8]) {
                const angle = Math.atan2(-y, x) * (180 / Math.PI);
                if (angle >= 45 && angle < 135) arrow = "↑";
                else if (angle >= 135 || angle < -135) arrow = "←";
                else if (angle >= -135 && angle < -45) arrow = "↓";
                else arrow = "→";
            }
            return { score, arrow };
        }

        canvas.addEventListener('mousedown', function(e) {
            const rect = canvas.getBoundingClientRect();
            const clickX = e.clientX - rect.left - centerX;
            const clickY = e.clientY - rect.top - centerY;
            
            const result = calculateScoreAndArrow(clickX, clickY);
            const current_shot = { score: result.score, x: clickX, y: clickY, arrow: result.arrow };
            
            appState.shots.push(current_shot);
            appState.latest_score = result.score;
            appState.total_score = roundFloat(appState.total_score + result.score, 1);
            
            if (appState.series_list[appState.series_list.length - 1].length >= 5) {
                appState.series_list.push([]);
            }
            appState.series_list[appState.series_list.length - 1].push(current_shot);
            
            updateUI();
        });

        function roundFloat(value, decimals) {
            return Number(Math.round(value+'e'+decimals)+'e-'+decimals);
        }

        function updateUI() {
            document.getElementById('latestScore').innerText = appState.latest_score.toFixed(1);
            document.getElementById('totalScore').innerText = appState.total_score.toFixed(1);
            
            const totalShots = appState.shots.length;
            const avgDisplay = document.getElementById('avgScore');
            if (totalShots > 0) {
                let avg = appState.total_score / totalShots;
                avgDisplay.innerText = `AVG: ${avg.toFixed(1)}`;
            } else {
                avgDisplay.innerText = "AVG: 0.0";
            }

            drawTarget();
            updateHistoryTable();
        }

        function updateHistoryTable() {
            const headerRow = document.getElementById('tableHeader');
            const tableBody = document.getElementById('tableBody');
            headerRow.innerHTML = ''; tableBody.innerHTML = '';
            
            const seriesList = appState.series_list;
            if (!seriesList || seriesList[0].length === 0) return;
            const numSeries = seriesList.length;
            
            for (let s = 0; s < numSeries; s++) {
                let th = document.createElement('th'); th.innerText = `ชุดที่ ${s + 1}`; headerRow.appendChild(th);
            }
            for (let rowIdx = 0; rowIdx < 5; rowIdx++) {
                let tr = document.createElement('tr');
                for (let colIdx = 0; colIdx < numSeries; colIdx++) {
                    let td = document.createElement('td'); let shotData = seriesList[colIdx][rowIdx];
                    if (shotData) {
                        let arrowHtml = shotData.arrow ? `<span class="arrow-indicator">${shotData.arrow}</span>` : '';
                        td.innerHTML = `${shotData.score.toFixed(1)}${arrowHtml}`;
                    } else { td.innerText = "0.0"; }
                    tr.appendChild(td);
                }
                tableBody.appendChild(tr);
            }
            let totalTr = document.createElement('tr');
            for (let colIdx = 0; colIdx < numSeries; colIdx++) {
                let td = document.createElement('td'); td.className = "series-sum";
                let sum = 0.0; seriesList[colIdx].forEach(shot => { sum += shot.score; });
                td.innerText = sum > 0 ? sum.toFixed(1) : "0.0"; totalTr.appendChild(td);
            }
            tableBody.appendChild(totalTr);
        }

        function resetSystem() {
            appState = { total_score: 0.0, latest_score: 0.0, shots: [], series_list: [[]] };
            updateUI();
        }

        drawTarget();
    </script>
</body>
</html>
